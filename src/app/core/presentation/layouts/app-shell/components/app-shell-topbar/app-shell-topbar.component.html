<div class="shell-header">
  <div class="topbar-left">
    <button
      nbButton
      ghost
      size="small"
      class="logo-button"
      (click)="onMenuToggle()"
      aria-label="Abrir menu"
    >
      <img src="/logop.png" alt="Logo de Pergamo" class="logo-image" />
    </button>
    <nb-search type="rotate-layout"></nb-search>
  </div>

  <div class="topbar-center">
  </div>

  <div class="topbar-right">
    <nb-toggle
      [checked]="isDarkMode()"
      (checkedChange)="onThemeToggle($event)"
      aria-label="Cambiar entre modo claro y oscuro"
    ></nb-toggle>

    <button nbButton ghost size="large" style="position: relative;" class="icon-ball" >
      <nb-icon icon="bell-outline" [options]="{ animation: { type: 'zoom' } }" class="icon-ball"></nb-icon>
      <nb-badge
          [text]="notificationCount.toString()"
          status="danger"
          position="top right"
        ></nb-badge>
    </button>

    <div class="user-profile">
      <div class="user-profile-text">
        <span class="user-profile-name">{{ userName() }}</span>
        <span class="user-profile-role">{{ userTitle() }}</span>
      </div>

      <nb-user
        [name]="userInitials()"
        [title]="''"
        [onlyPicture]="true"
        badgePosition="bottom right"
        badgeStatus="success"
        color="#3366ff"
        shape="round"
        size="large"
      ></nb-user>
    </div>
  </div>
</div>
